<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anunciar Produto - Ludovico</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="ASSETS/CSS/anunciar.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Ludovico</h1>
    <nav>
      <a href="index.html">Início</a>
      <a href="#">Anunciar</a>
      <a href="#">Login</a>
    </nav>
  </header>

  <!-- CONTEÚDO -->
  <main class="container">

    <div class="form-box">
      <h2>Anunciar Produto</h2>

      <form id="formProduto">

  <label>Nome do Produto</label>
  <input type="text" id="nome" required>

  <label>Preço</label>
  <input type="number" id="preco" required>

  <label>Telefone</label>
<input type="text" id="telefone" required>

  <label>Descrição</label>
  <textarea id="descricao" required></textarea>

  <label>Imagem do Produto</label>
  <input type="file" id="imagem" accept="image/*" required>

  <button type="submit">Publicar Produto</button>

</form>
    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Ludovico - Marketplace Artesanal</p>
  </footer>
  
  <script src="ASSETS/JS/anunciar.js"></script>

</body>
</html>
